<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — SimchaMap</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --gold: #C9A84C; --gold-light: #E8C97A; --gold-pale: #F7EDD4;
  --deep: #1A1209; --cream: #FAF6EE; --warm: #F2E8D0;
  --text: #2C1F0A; --muted: #8A7355;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--cream); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; flex-direction:column; }

nav { display:flex; align-items:center; justify-content:space-between; padding:1rem 2rem; background:rgba(250,246,238,0.97); border-bottom:1px solid rgba(201,168,76,0.2); }
.nav-logo { text-decoration:none; display:flex; align-items:center; gap:0.65rem; }
.nav-logo-text { font-family:'Playfair Display',serif; font-size:1.25rem; font-weight:900; color:#2C1F0A; }
.nav-logo-tag { display:block; font-size:0.55rem; font-weight:500; color:#C9A84C; letter-spacing:0.12em; text-transform:uppercase; }

.container { flex:1; display:flex; align-items:center; justify-content:center; padding:3rem 1.5rem; }
.card { background:white; border:1px solid rgba(201,168,76,0.2); border-radius:12px; padding:2.5rem; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(44,31,10,0.08); }

.title { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:900; color:var(--deep); text-align:center; margin-bottom:0.25rem; }
.subtitle { font-size:0.78rem; color:var(--muted); text-align:center; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:2rem; }

.tabs { display:flex; border-bottom:2px solid var(--warm); margin-bottom:1.5rem; }
.tab-btn { flex:1; padding:0.75rem; font-size:0.9rem; font-weight:500; cursor:pointer; color:var(--muted); border:none; background:none; border-bottom:2px solid transparent; margin-bottom:-2px; font-family:'DM Sans',sans-serif; transition:all 0.2s; }
.tab-btn.active { color:var(--gold); border-bottom-color:var(--gold); }

.form-panel { display:none; }
.form-panel.active { display:block; }

.field { margin-bottom:1.1rem; }
.field label { display:block; font-size:0.8rem; font-weight:500; color:var(--muted); margin-bottom:0.35rem; }
.field input { width:100%; padding:0.75rem 1rem; border:1px solid rgba(201,168,76,0.3); border-radius:6px; font-family:'DM Sans',sans-serif; font-size:0.95rem; color:var(--text); background:var(--cream); outline:none; transition:border-color 0.2s; }
.field input:focus { border-color:var(--gold); background:white; }

.btn-primary { width:100%; background:var(--gold); color:var(--deep); border:none; padding:0.9rem; border-radius:6px; font-family:'DM Sans',sans-serif; font-size:1rem; font-weight:600; cursor:pointer; transition:all 0.2s; margin-top:0.25rem; }
.btn-primary:hover { background:var(--gold-light); }
.btn-primary:disabled { opacity:0.6; cursor:not-allowed; }

.divider { display:flex; align-items:center; gap:1rem; margin:1.25rem 0; }
.divider-line { flex:1; height:1px; background:var(--warm); }
.divider-text { font-size:0.78rem; color:var(--muted); }

.btn-google { width:100%; background:white; color:var(--text); border:1.5px solid rgba(44,31,10,0.15); padding:0.85rem; border-radius:6px; font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:500; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:0.75rem; transition:all 0.2s; }
.btn-google:hover { border-color:var(--gold); }

.forgot { text-align:center; margin-top:0.75rem; font-size:0.82rem; }
.forgot a { color:var(--gold); text-decoration:none; cursor:pointer; }

.msg { padding:0.75rem 1rem; border-radius:6px; font-size:0.85rem; margin-bottom:1rem; display:none; }
.msg.error { background:rgba(200,50,50,0.08); border:1px solid rgba(200,50,50,0.2); color:#c03030; }
.msg.success { background:rgba(42,122,90,0.08); border:1px solid rgba(42,122,90,0.2); color:#2A7A5A; }

.terms { font-size:0.75rem; color:var(--muted); text-align:center; margin-top:1rem; line-height:1.6; }

footer { background:var(--deep); padding:1.5rem; text-align:center; }
.footer-logo { font-family:'Playfair Display',serif; font-size:1rem; font-weight:900; color:var(--cream); }
.footer-logo span { color:var(--gold); }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <svg width="30" height="36" viewBox="0 0 88 104" xmlns="http://www.w3.org/2000/svg">
      <path d="M44 0 C24 0 8 16 8 36 C8 60 44 104 44 104 C44 104 80 60 80 36 C80 16 64 0 44 0Z" fill="#C9A84C"/>
      <circle cx="44" cy="34" r="14" fill="#FAF6EE"/>
      <circle cx="44" cy="34" r="5" fill="#C9A84C"/>
    </svg>
    <div><span class="nav-logo-text">SimchaMap</span><span class="nav-logo-tag">Every Detail. One Place.</span></div>
  </a>
  <a href="index.html" style="text-decoration:none;color:var(--muted);font-size:0.85rem;">Back to Home</a>
</nav>

<div class="container">
  <div class="card">
    <div class="title">Welcome</div>
    <div class="subtitle">Sign in to save your simcha planning progress</div>

    <div class="tabs">
      <button class="tab-btn active" id="tab-login" onclick="showTab('login')">Sign In</button>
      <button class="tab-btn" id="tab-signup" onclick="showTab('signup')">Create Account</button>
    </div>

    <div id="msg" class="msg"></div>

    <!-- LOGIN -->
    <div id="panel-login" class="form-panel active">
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="your@email.com" onkeydown="if(event.key==='Enter')doSignIn()">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="Your password" onkeydown="if(event.key==='Enter')doSignIn()">
      </div>
      <button class="btn-primary" id="btn-signin" onclick="doSignIn()">Sign In</button>
      <div class="forgot"><a onclick="doForgot()">Forgot your password?</a></div>
      <div class="divider"><div class="divider-line"></div><div class="divider-text">or</div><div class="divider-line"></div></div>
      <button class="btn-google" onclick="doGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
    </div>

    <!-- SIGNUP -->
    <div id="panel-signup" class="form-panel">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="signup-name" placeholder="Your name">
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="signup-email" placeholder="your@email.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signup-pass" placeholder="Minimum 6 characters" onkeydown="if(event.key==='Enter')doSignUp()">
      </div>
      <button class="btn-primary" id="btn-signup" onclick="doSignUp()">Create Account</button>
      <div class="divider"><div class="divider-line"></div><div class="divider-text">or</div><div class="divider-line"></div></div>
      <button class="btn-google" onclick="doGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <div class="terms">By creating an account you agree to our Terms of Service and Privacy Policy.</div>
    </div>
  </div>
</div>

<footer>
  <div class="footer-logo">Simcha<span>Map</span></div>
</footer>

<script>
var sb = window.supabase.createClient(
  'https://gzbcwzjxycbyzpqhpdgx.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6YmN3emp4eWNieXpwcWhwZGd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NzY1NTIsImV4cCI6MjA5NjI1MjU1Mn0.ahiv-HbHJ0ttc-9PfaRPxGdeGuuULc3WpLQbSn_cu7M'
);

// Redirect if already logged in
sb.auth.getSession().then(function(r) {
  if (r.data.session) window.location.href = 'dashboard.html';
});

function showTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('panel-login').classList.toggle('active', tab === 'login');
  document.getElementById('panel-signup').classList.toggle('active', tab === 'signup');
  showMsg('', '');
}

function showMsg(text, type) {
  var el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg' + (type ? ' ' + type : '');
  el.style.display = text ? 'block' : 'none';
}

async function doSignIn() {
  var email = document.getElementById('login-email').value.trim();
  var pass = document.getElementById('login-pass').value;
  if (!email || !pass) { showMsg('Please enter your email and password.', 'error'); return; }
  var btn = document.getElementById('btn-signin');
  btn.disabled = true; btn.textContent = 'Signing in...';
  var r = await sb.auth.signInWithPassword({ email: email, password: pass });
  if (r.error) {
    showMsg(r.error.message, 'error');
    btn.disabled = false; btn.textContent = 'Sign In';
  } else {
    showMsg('Welcome back! Redirecting...', 'success');
    setTimeout(function() { window.location.href = 'dashboard.html'; }, 800);
  }
}

async function doSignUp() {
  var name = document.getElementById('signup-name').value.trim();
  var email = document.getElementById('signup-email').value.trim();
  var pass = document.getElementById('signup-pass').value;
  if (!name || !email || !pass) { showMsg('Please fill in all fields.', 'error'); return; }
  if (pass.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }
  var btn = document.getElementById('btn-signup');
  btn.disabled = true; btn.textContent = 'Creating account...';
  var r = await sb.auth.signUp({ email: email, password: pass, options: { data: { full_name: name } } });
  if (r.error) {
    // Check if user already exists
    if (r.error.message.toLowerCase().includes('already') || r.error.status === 400) {
      showMsg('An account with this email already exists. Please sign in instead.', 'error');
      setTimeout(function() { showTab('login'); document.getElementById('login-email').value = email; }, 1500);
    } else {
      showMsg(r.error.message, 'error');
    }
    btn.disabled = false; btn.textContent = 'Create Account';
  } else if (r.data.user && r.data.user.identities && r.data.user.identities.length === 0) {
    // User already exists (Supabase returns empty identities for existing users)
    showMsg('An account with this email already exists. Switching to Sign In...', 'error');
    setTimeout(function() { showTab('login'); document.getElementById('login-email').value = email; }, 1500);
    btn.disabled = false; btn.textContent = 'Create Account';
  } else if (r.data.user && !r.data.session) {
    showMsg('Account created! Please check your email to confirm, then sign in.', 'success');
    btn.disabled = false; btn.textContent = 'Create Account';
  } else {
    showMsg('Account created! Redirecting...', 'success');
    setTimeout(function() { window.location.href = 'dashboard.html'; }, 800);
  }
}

async function doGoogle() {
  var r = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: 'https://simchamap.com/dashboard.html' }
  });
  if (r.error) showMsg(r.error.message, 'error');
}

async function doForgot() {
  var email = document.getElementById('login-email').value.trim();
  if (!email) { showMsg('Please enter your email address first.', 'error'); return; }
  var r = await sb.auth.resetPasswordForEmail(email, { redirectTo: 'https://simchamap.com/login.html' });
  if (r.error) showMsg(r.error.message, 'error');
  else showMsg('Password reset email sent! Check your inbox.', 'success');
}
</script>
</body>
</html>
