<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - SimchaMap</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=Playfair+Display:wght@600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="site.css">
  <style>
    .auth-wrap{min-height:calc(100vh - 72px);display:grid;place-items:center;padding:36px 20px}.auth-card{width:min(100%,460px)}.auth-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:20px 0}.auth-panel{display:none}.auth-panel.active{display:grid;gap:12px}.msg{display:none;border-radius:8px;padding:11px 12px;font-weight:800;margin-top:12px}.msg.success{display:block;background:var(--sage-soft);color:var(--sage)}.msg.error{display:block;background:#f2e2df;color:var(--danger)}.google{width:100%;background:#fff;border:1px solid var(--line)}.forgot{background:none;border:0;color:var(--sage);font-weight:900;padding:0;text-align:left}
  </style>
</head>
<body>
<div class="app-shell">
  <header class="topbar">
    <nav class="nav">
      <a class="brand" href="index.html"><span class="brand-mark"></span><span><span class="brand-name">SimchaMap</span><span class="brand-tag">Every detail. One place.</span></span></a>
      <div class="nav-links"><a href="rockland.html">Vendors</a><a href="dashboard.html">Organizer</a><a href="resources.html">Resources</a></div>
    </nav>
  </header>
  <main class="auth-wrap">
    <section class="panel panel-pad auth-card">
      <p class="eyebrow">Account</p>
      <h1 style="font-size:3rem">Sign in</h1>
      <p>Access your organizer, account settings, and admin tools if your account is approved as an admin.</p>
      <div class="auth-tabs">
        <button class="tab active" id="tab-login" onclick="showTab('login')">Sign in</button>
        <button class="tab" id="tab-signup" onclick="showTab('signup')">Create account</button>
      </div>
      <div id="panel-login" class="auth-panel active">
        <div class="field"><label>Email</label><input id="login-email" type="email" autocomplete="email"></div>
        <div class="field"><label>Password</label><input id="login-pass" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doSignIn()"></div>
        <button class="btn sage" id="btn-signin" onclick="doSignIn()">Sign In</button>
        <button class="forgot" onclick="doForgot()">Forgot your password?</button>
      </div>
      <div id="panel-signup" class="auth-panel">
        <div class="field"><label>Name</label><input id="signup-name" type="text" autocomplete="name"></div>
        <div class="field"><label>Email</label><input id="signup-email" type="email" autocomplete="email"></div>
        <div class="field"><label>Password</label><input id="signup-pass" type="password" autocomplete="new-password" onkeydown="if(event.key==='Enter')doSignUp()"></div>
        <button class="btn sage" id="btn-signup" onclick="doSignUp()">Create Account</button>
      </div>
      <div class="actions" style="display:block"><button class="btn google" onclick="doGoogle()">Continue with Google</button></div>
      <div id="msg" class="msg"></div>
      <p style="font-size:.9rem">By creating an account, you agree to the <a href="privacy.html">Privacy Policy</a>.</p>
    </section>
  </main>
</div>

<script>
const SUPABASE_URL='https://gzbcwzjxycbyzpqhpdgx.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6YmN3emp4eWNieXpwcWhwZGd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NzY1NTIsImV4cCI6MjA5NjI1MjU1Mn0.ahiv-HbHJ0ttc-9PfaRPxGdeGuuULc3WpLQbSn_cu7M';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
const SITE_ORIGIN=(window.location.origin && window.location.origin !== 'null') ? window.location.origin : 'https://simchamap.com';
function showTab(tab){document.getElementById('tab-login').classList.toggle('active',tab==='login');document.getElementById('tab-signup').classList.toggle('active',tab==='signup');document.getElementById('panel-login').classList.toggle('active',tab==='login');document.getElementById('panel-signup').classList.toggle('active',tab==='signup');showMsg('','')}
function showMsg(text,type){const el=document.getElementById('msg');el.textContent=text;el.className='msg '+(type||'');el.style.display=text?'block':'none'}
sb.auth.getSession().then(r=>{if(r.data.session) window.location.href='dashboard.html'});
async function doSignIn(){const email=document.getElementById('login-email').value.trim();const password=document.getElementById('login-pass').value;if(!email||!password)return showMsg('Please enter your email and password.','error');const btn=document.getElementById('btn-signin');btn.disabled=true;btn.textContent='Signing in...';const {error}=await sb.auth.signInWithPassword({email,password});if(error){showMsg(error.message,'error');btn.disabled=false;btn.textContent='Sign In';return}showMsg('Signed in. Redirecting...','success');window.location.href='dashboard.html'}
async function doSignUp(){const name=document.getElementById('signup-name').value.trim();const email=document.getElementById('signup-email').value.trim();const password=document.getElementById('signup-pass').value;if(!name||!email||!password)return showMsg('Please fill in all fields.','error');if(password.length<8)return showMsg('Password must be at least 8 characters.','error');const btn=document.getElementById('btn-signup');btn.disabled=true;btn.textContent='Creating...';const {data,error}=await sb.auth.signUp({email,password,options:{data:{full_name:name},emailRedirectTo:SITE_ORIGIN+'/dashboard.html'}});btn.disabled=false;btn.textContent='Create Account';if(error)return showMsg(error.message,'error');if(data.user&&!data.session)return showMsg('Account created. Check your email to confirm, then sign in.','success');window.location.href='dashboard.html'}
async function doGoogle(){showMsg('Opening Google sign-in...','success');const {error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:SITE_ORIGIN+'/dashboard.html'}});if(error)showMsg(error.message,'error')}
async function doForgot(){const email=document.getElementById('login-email').value.trim();if(!email)return showMsg('Enter your email first.','error');const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:SITE_ORIGIN+'/account.html'});if(error)return showMsg(error.message,'error');showMsg('Password reset email sent.','success')}
</script>
</body>
</html>
